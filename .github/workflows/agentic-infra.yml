name: agentic-infra

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  verify-shell-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bash syntax check
        run: |
          while IFS= read -r -d '' file; do
            if head -n 1 "$file" | grep -Eq '^#!.*\b(bash|sh)\b'; then
              bash -n "$file"
            fi
          done < <(find scripts -maxdepth 1 -type f -print0)

      - name: Validate JSON config files
        run: |
          jq empty pi/settings.json
          jq empty pi/agent/settings.json
          jq empty pi/models.json

      - name: Run script tests
        run: |
          if [ -f scripts/cw ]; then
            bash tests/cw-smoke.sh
          fi
          bash tests/workflow-docs-smoke.sh

  verify-pi-typescript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Install Pi test dependencies
        run: |
          cd pi
          bun install --frozen-lockfile

      - name: Run Pi integration tests
        run: |
          cd pi
          bun test ./extensions/__tests__/*integration.test.ts

      - name: Run Pi TypeScript test suite
        run: |
          cd pi
          bun test ./extensions/__tests__/*.test.ts

      - name: Run Pi extension import smoke
        run: |
          cd pi
          bun -e 'for (const path of [
            "./extensions/auto-hide-header.ts",
            "./extensions/block-google-providers.ts",
            "./extensions/context-budget.ts",
            "./extensions/damage-control.ts",
            "./extensions/filter-output.ts",
            "./extensions/handoff.ts",
            "./extensions/img.ts",
            "./extensions/ops-status.ts",
            "./extensions/pi-setup.ts",
            "./extensions/plan-state.ts",
            "./extensions/rtk.ts",
            "./extensions/runtime-status.ts",
            "./extensions/subagent.ts",
            "./extensions/tilldone.ts",
            "./extensions/tool-counter.ts",
            "./extensions/welcome.ts",
          ]) await import(path)'
